name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish. Leave empty for main."
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-docker-${{ github.event.release.tag_name || inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.repository == 'ShibuiTravel/agent' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve publish ref
        id: publish-ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.publish-ref.outputs.ref }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          version=$(node -p "require('./packages/coding-agent/package.json').version")
          created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          dockerhub_enabled=false

          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            dockerhub_enabled=true
          fi

          {
            echo "version=$version"
            echo "created=$created"
            echo "dockerhub_enabled=$dockerhub_enabled"
            echo "tags<<EOF"
            echo "ghcr.io/shibuitravel/agent:$version"
            echo "ghcr.io/shibuitravel/agent:latest"
            if [ "$dockerhub_enabled" = "true" ]; then
              echo "docker.io/shibuitravel/agent:$version"
              echo "docker.io/shibuitravel/agent:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.meta.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shibui-agent:${{ steps.meta.outputs.version }}
          build-args: |
            SHIBUI_VERSION=${{ steps.meta.outputs.version }}
            OCI_CREATED=${{ steps.meta.outputs.created }}
            OCI_REVISION=${{ github.sha }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          output=$(docker run --rm -e SHIBUI_SKIP_VERSION_CHECK=1 shibui-agent:${{ steps.meta.outputs.version }} --version 2>&1)
          printf '%s\n' "$output"
          test "$output" = "${{ steps.meta.outputs.version }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Shibui Agent
            org.opencontainers.image.description=Open-source Shibui coding agent CLI
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
          build-args: |
            SHIBUI_VERSION=${{ steps.meta.outputs.version }}
            OCI_CREATED=${{ steps.meta.outputs.created }}
            OCI_REVISION=${{ github.sha }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
