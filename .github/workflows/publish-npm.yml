name: Publish npm Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, usually a v* tag. Official releases call this from release-shibui.yml."
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.repository == 'ShibuiTravel/agent' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve publish ref
        id: publish-ref
        run: |
          echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.publish-ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish @shibuitravel/agent
        run: npm publish --workspace @shibuitravel/agent --access public --ignore-scripts
