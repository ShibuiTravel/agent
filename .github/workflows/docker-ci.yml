name: Docker CI

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker-ci.yml
      - .github/workflows/publish-docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker-ci.yml
      - .github/workflows/publish-docker.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve package version
        id: version
        run: echo "version=$(node -p 'require("./packages/coding-agent/package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shibui-agent:${{ steps.version.outputs.version }}
          build-args: |
            SHIBUI_VERSION=${{ steps.version.outputs.version }}
            OCI_CREATED=${{ github.event.repository.updated_at }}
            OCI_REVISION=${{ github.sha }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          output=$(docker run --rm -e SHIBUI_SKIP_VERSION_CHECK=1 shibui-agent:${{ steps.version.outputs.version }} --version 2>&1)
          printf '%s\n' "$output"
          test "$output" = "${{ steps.version.outputs.version }}"
