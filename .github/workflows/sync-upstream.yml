name: Sync Upstream

on:
  schedule:
    - cron: "11 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SYNC_BRANCH: automation/sync-upstream
  UPSTREAM_REPO: https://github.com/badlogic/pi-mono.git

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.repository == 'ShibuiTravel/agent' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SHIBUI_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_REPO" || git remote set-url upstream "$UPSTREAM_REPO"
          git fetch origin main --prune
          git fetch upstream main --prune

      - name: Check upstream delta
        id: delta
        run: |
          behind=$(git rev-list --count origin/main..upstream/main)
          echo "behind=$behind" >> "$GITHUB_OUTPUT"
          echo "origin/main is $behind commit(s) behind upstream/main"

      - name: Stop when current
        if: steps.delta.outputs.behind == '0'
        run: echo "No upstream commits to sync."

      - name: Merge upstream into sync branch
        if: steps.delta.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.SHIBUI_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git checkout -B "$SYNC_BRANCH" origin/main
          if ! git merge --no-edit upstream/main; then
            git merge --abort || true
            {
              echo "Upstream sync hit merge conflicts."
              echo
              echo "Resolve locally with:"
              echo "  git fetch upstream main"
              echo "  git checkout -B $SYNC_BRANCH origin/main"
              echo "  git merge upstream/main"
            } > /tmp/upstream-sync-conflict.md
            gh issue create \
              --title "Manual upstream sync required" \
              --body-file /tmp/upstream-sync-conflict.md || true
            exit 1
          fi

      - name: Push sync branch
        if: steps.delta.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.SHIBUI_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Open or update pull request
        if: steps.delta.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.SHIBUI_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          body=$(mktemp)
          cat > "$body" <<'EOF'
          Syncs Shibui with upstream `badlogic/pi-mono/main`.

          Review checklist:
          - Preserve Shibui package names, binary names, config roots, and publishing workflows.
          - Check upstream workflow changes before merging.
          - Run the normal CI checks before release.

          This PR only syncs source. It does not publish a Shibui release.
          EOF

          pr_number=$(gh pr list --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "Sync upstream Pi" --body-file "$body"
            echo "Updated PR #$pr_number"
          else
            gh pr create \
              --title "Sync upstream Pi" \
              --body-file "$body" \
              --base main \
              --head "$SYNC_BRANCH"
          fi
